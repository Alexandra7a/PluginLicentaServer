name: CI Pipeline
on: [push, pull_request]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ENVIRONMENT SETUP
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # DEPENDENCY CACHING
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}-${{ hashFiles('**/gradle-wrapper.properties') }}

    # LINTING STAGE
    - name: Configure Checkstyle
      run: |
        mkdir -p config/checkstyle
        curl -sL https://raw.githubusercontent.com/checkstyle/checkstyle/master/src/main/resources/google_checks.xml > config/checkstyle/checkstyle.xml
    
    - name: Run Linter
      run: ./gradlew checkstyleMain

    # BUILD STAGE
    - name: Build project
      run: ./gradlew clean build

    # TEST STAGE
    - name: Run tests
      run: ./gradlew test

    # OPTIONAL: Check code coverage (if applicable)
    # - name: Check code coverage
    #   run: ./gradlew jacocoTestReport

    # ADDITIONAL STEPS BASED ON SECRETS
    - name: Deploy to Cloud Provider
      if: secrets.AZURE_SECRET_KEY
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'my-app'
        slot-name: 'production'
        publish-profile: ${{ secrets.AZURE_SECRET_KEY }}
        package: '.'
      env:
        NODE_ENV: 'production'
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        REDIS_URL: ${{ secrets.REDIS_URL }}
```

### Conclusion

Your CI pipeline is already quite solid, and with these enhancements, you can improve its robustness and efficiency. Make sure to test the pipeline after making changes to ensure everything works as expected.