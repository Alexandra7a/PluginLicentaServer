name: CI Pipeline
on: [push, pull_request]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ENVIRONMENT SETUP
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # DEPENDENCY CACHING
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      # LINTING STAGE
      - name: Install Flake8
        run: pip install flake8

      - name: Run Linter
        run: flake8 .
        # QUALITY GATE: Fails on style violations

      # BUILD STAGE
      - name: Build Docker image
        run: docker build -t vulnerability_detection .

      # TEST STAGE
      - name: Run tests
        run: |
          pip install pytest
          pytest
        # QUALITY GATE: Fails on test failures

      # DEPLOYMENT STAGE
      - name: Deploy to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.DOCKER_HUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
          docker tag vulnerability_detection ${{ secrets.DOCKER_HUB_USERNAME }}/vulnerability_detection:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/vulnerability_detection:latest